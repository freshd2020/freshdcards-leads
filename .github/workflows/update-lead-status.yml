name: Update Lead Status

on:
  repository_dispatch:
    types: [update-lead-status]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update leads_status.json
        env:
          LEAD_ID: ${{ github.event.client_payload.id }}
          LEAD_STATUS: ${{ github.event.client_payload.status }}
        run: |
          git pull origin main
          python3 << 'EOF'
          import json, os

          lead_id = str(os.environ["LEAD_ID"])
          status  = os.environ["LEAD_STATUS"]

          with open("leads_status.json") as f:
              data = json.load(f)

          if data.get(lead_id) == status or status == "clear":
              data.pop(lead_id, None)
          else:
              data[lead_id] = status

          with open("leads_status.json", "w") as f:
              json.dump(data, f, indent=2, sort_keys=True)

          print(f"Lead {lead_id} -> {status}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads_status.json
          git diff --staged --quiet || git commit -m "tracker: lead ${{ github.event.client_payload.id }} -> ${{ github.event.client_payload.status }}"
          git push
