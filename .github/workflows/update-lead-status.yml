name: Update Lead Status

on:
  repository_dispatch:
    types: [update-lead-status]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update leads_status.json
        run: |
          python3 << 'EOF'
          import json

          lead_id = str(${{ toJson(github.event.client_payload.id) }})
          status  = "${{ github.event.client_payload.status }}"

          with open("leads_status.json") as f:
              data = json.load(f)

          if data.get(lead_id) == status or status == "clear":
              data.pop(lead_id, None)
          else:
              data[lead_id] = status

          with open("leads_status.json", "w") as f:
              json.dump(data, f, indent=2, sort_keys=True)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads_status.json
          git diff --staged --quiet || git commit -m "tracker: lead ${{ github.event.client_payload.id }} -> ${{ github.event.client_payload.status }}"
          git push
