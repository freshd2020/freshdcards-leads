# .github/workflows/update-lead-status.yml
# Triggered by repository_dispatch from the Glengarry Leads tracker
# Updates leads_status.json with the new status for a lead ID

name: Update Lead Status

on:
  repository_dispatch:
    types: [update-lead-status]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update leads_status.json
        run: |
          python3 << 'EOF'
          import json, os

          lead_id = str(${{ toJson(github.event.client_payload.id) }})
          status  = "${{ github.event.client_payload.status }}"

          # Load existing status file
          path = "leads_status.json"
          with open(path) as f:
              data = json.load(f)

          # Toggle: if same status sent again, remove it (unset)
          if data.get(lead_id) == status:
              del data[lead_id]
              action = f"Cleared status for lead {lead_id}"
          else:
              data[lead_id] = status
              action = f"Set lead {lead_id} -> {status}"

          with open(path, "w") as f:
              json.dump(data, f, indent=2, sort_keys=True)

          print(action)
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads_status.json
          git diff --staged --quiet || git commit -m "tracker: lead ${{ github.event.client_payload.id }} -> ${{ github.event.client_payload.status }}"
          git push
